<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Budget</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f5f0; --surface: #ffffff; --border: #e8e4dc;
  --text: #1a1814; --muted: #8a8278;
  --green: #2d6a4f; --green-light: #e8f5ee;
  --red: #c0392b; --red-light: #fdf0ee;
  --amber: #b8860b; --amber-light: #fdf8e8;
}
body { font-family:'Sora',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; padding-bottom:80px; }

/* LOADING */
#loadingScreen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:16px; }
.loading-title { font-family:'Playfair Display',serif; font-size:32px; color:var(--green); }
.loading-dots { display:flex; gap:6px; }
.loading-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:blink 1.2s infinite; }
.loading-dot:nth-child(2) { animation-delay:0.2s; }
.loading-dot:nth-child(3) { animation-delay:0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

#appShell { display:none; }

/* NAV */
.nav { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; }
.nav-title { font-family:'Playfair Display',serif; font-size:20px; color:var(--green); }
.nav-right { display:flex; align-items:center; gap:12px; }
.nav-month { font-size:11px; color:var(--muted); font-weight:500; }
.nav-icon-btn { background:none; border:none; cursor:pointer; color:var(--muted); padding:4px; display:flex; }

/* MONTH TABS */
.month-tabs { display:flex; gap:4px; padding:10px 16px; overflow-x:auto; scrollbar-width:none; background:var(--surface); border-bottom:1px solid var(--border); }
.month-tabs::-webkit-scrollbar { display:none; }
.month-tab { flex-shrink:0; padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:transparent; font-family:'Sora',sans-serif; font-size:11px; font-weight:500; color:var(--muted); cursor:pointer; transition:all 0.2s; }
.month-tab.active { background:var(--green); color:white; border-color:var(--green); }
.month-tab.future { opacity:0.6; }

/* BOTTOM NAV */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); display:flex; z-index:100; }
.bottom-nav-btn { flex:1; padding:12px 4px 10px; border:none; background:none; font-family:'Sora',sans-serif; font-size:10px; color:var(--muted); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; transition:color 0.2s; }
.bottom-nav-btn.active { color:var(--green); }
.bottom-nav-btn svg { width:20px; height:20px; }

/* PAGES */
.page { display:none; padding:16px; }
.page.active { display:block; }

/* CARDS */
.card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; }
.card-title { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
.section-divider { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin:16px 0 8px; }

/* HERO */
.summary-hero { background:var(--green); color:white; border-radius:16px; padding:20px; margin-bottom:12px; }
.summary-hero-label { font-size:11px; opacity:0.7; margin-bottom:4px; }
.summary-hero-amount { font-family:'Playfair Display',serif; font-size:36px; margin-bottom:16px; }
.summary-hero-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.summary-hero-item { background:rgba(255,255,255,0.12); border-radius:8px; padding:10px; }
.summary-hero-item-label { font-size:10px; opacity:0.7; margin-bottom:2px; }
.summary-hero-item-value { font-size:15px; font-weight:600; }

/* PROGRESS */
.progress-item { margin-bottom:14px; }
.progress-item:last-child { margin-bottom:0; }
.progress-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.progress-name { font-size:13px; font-weight:500; }
.progress-right { display:flex; align-items:center; gap:8px; }
.progress-amounts { font-size:11px; color:var(--muted); }
.progress-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; transition:width 0.5s ease; }
.progress-fill.ok { background:var(--green); }
.progress-fill.warn { background:var(--amber); }
.progress-fill.over { background:var(--red); }

/* SAVINGS */
.savings-item { margin-bottom:14px; }
.savings-item:last-child { margin-bottom:0; }
.savings-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.savings-name { font-size:13px; font-weight:500; }
.savings-val { font-size:13px; font-weight:600; color:var(--green); }
.savings-track { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.savings-fill { height:100%; background:var(--green); border-radius:4px; transition:width 0.5s ease; }

/* EDIT BTN */
.edit-budget-btn { background:var(--green-light); border:1px solid var(--green); border-radius:6px; padding:3px 10px; font-size:10px; font-family:'Sora',sans-serif; cursor:pointer; color:var(--green); white-space:nowrap; font-weight:600; }
.auto-label { font-size:9px; color:var(--muted); font-style:italic; }

/* TRANSACTIONS */
.tx-wrap { position:relative; overflow:hidden; border-bottom:1px solid var(--border); }
.tx-wrap:last-child { border-bottom:none; }
.tx-item { display:flex; align-items:center; justify-content:space-between; padding:10px 0; background:var(--surface); position:relative; z-index:1; transition:transform 0.25s ease; touch-action:pan-y; user-select:none; }
.tx-actions { position:absolute; right:0; top:0; bottom:0; display:flex; align-items:stretch; z-index:0; }
.tx-action-btn { width:64px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:9px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; border:none; cursor:pointer; font-family:'Sora',sans-serif; }
.tx-action-btn.edit { background:var(--amber); color:white; }
.tx-action-btn.del { background:var(--red); color:white; }
.tx-action-btn svg { width:16px; height:16px; }
.tx-left { display:flex; align-items:center; gap:10px; }
.tx-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.tx-store { font-size:13px; font-weight:500; }
.tx-cat { font-size:11px; color:var(--muted); }
.tx-amount { font-size:14px; font-weight:600; }
.tx-amount.expense { color:var(--red); }
.tx-amount.income-amt { color:var(--green); }
.tx-hint { font-size:10px; color:var(--muted); text-align:center; padding:4px 0 6px; font-style:italic; }

/* CHART */
.chart-bars { display:flex; align-items:flex-end; gap:4px; height:100px; padding-top:8px; }
.chart-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.chart-bar-wrap { flex:1; display:flex; align-items:flex-end; width:100%; gap:2px; }
.chart-bar { width:100%; border-radius:3px 3px 0 0; min-height:2px; }
.chart-bar.income-bar { background:var(--green); opacity:0.85; }
.chart-bar.spent-bar { background:var(--border); }
.chart-label { font-size:9px; color:var(--muted); }
.chart-legend { display:flex; gap:12px; margin-top:10px; justify-content:center; }
.chart-legend-item { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--muted); }
.chart-legend-dot { width:8px; height:8px; border-radius:2px; }

/* FORM */
.form-group { margin-bottom:14px; }
.form-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; display:block; }
.form-input, .form-select { width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:10px; font-family:'Sora',sans-serif; font-size:14px; background:var(--surface); color:var(--text); appearance:none; -webkit-appearance:none; }
.form-input:focus, .form-select:focus { outline:none; border-color:var(--green); }
.form-submit { width:100%; padding:14px; background:var(--green); color:white; border:none; border-radius:10px; font-family:'Sora',sans-serif; font-size:14px; font-weight:600; cursor:pointer; margin-top:4px; }
.type-toggle { display:flex; gap:8px; margin-bottom:16px; }
.type-btn { flex:1; padding:10px; border:1px solid var(--border); border-radius:10px; background:none; font-family:'Sora',sans-serif; font-size:13px; font-weight:500; cursor:pointer; color:var(--muted); transition:all 0.2s; }
.type-btn.active.expense { background:var(--red-light); border-color:var(--red); color:var(--red); }
.type-btn.active.income { background:var(--green-light); border-color:var(--green); color:var(--green); }
.tithe-preview { font-size:12px; color:var(--muted); margin:-8px 0 12px; padding:8px 12px; background:var(--bg); border-radius:8px; display:none; line-height:1.6; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:500; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border-radius:20px 20px 0 0; padding:24px 20px 40px; width:100%; transform:translateY(100%); transition:transform 0.3s ease; max-height:90vh; overflow-y:auto; }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-title { font-family:'Playfair Display',serif; font-size:20px; margin-bottom:20px; }
.modal-actions { display:flex; gap:10px; margin-top:20px; }
.modal-cancel { flex:1; padding:13px; border:1px solid var(--border); border-radius:10px; background:none; font-family:'Sora',sans-serif; font-size:14px; cursor:pointer; }
.modal-save { flex:2; padding:13px; background:var(--green); color:white; border:none; border-radius:10px; font-family:'Sora',sans-serif; font-size:14px; font-weight:600; cursor:pointer; }
.modal-delete-btn { width:100%; padding:13px; background:var(--red-light); color:var(--red); border:1px solid var(--red); border-radius:10px; font-family:'Sora',sans-serif; font-size:14px; font-weight:600; cursor:pointer; margin-top:10px; }

/* TOAST */
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:white; padding:10px 20px; border-radius:20px; font-size:13px; opacity:0; transition:all 0.3s; pointer-events:none; z-index:600; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* UNASSIGNED BANNER */
.unassigned-banner { background:var(--amber-light); border:1px solid var(--amber); border-radius:12px; padding:14px 16px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
.unassigned-label { font-size:11px; font-weight:600; color:var(--amber); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:2px; }
.unassigned-amount { font-size:20px; font-weight:700; color:var(--amber); }
.unassigned-sub { font-size:11px; color:var(--muted); margin-top:1px; }
.assign-btn { background:var(--amber); color:white; border:none; border-radius:8px; padding:8px 14px; font-family:'Sora',sans-serif; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }

/* EMPTY STATE */
.empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="loading-title">Budget</div>
  <div style="font-size:13px;color:var(--muted)">Loading your data...</div>
  <div class="loading-dots">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</div>

<div id="appShell">
  <div class="nav">
    <div class="nav-title">Budget</div>
    <div class="nav-right">
      <button class="nav-icon-btn" onclick="refreshAll()" title="Refresh">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </button>
      <div class="nav-month" id="navMonth"></div>
    </div>
  </div>

  <div class="month-tabs" id="monthTabs"></div>

  <div class="page active" id="page-dashboard"></div>
  <div class="page" id="page-spending"></div>
  <div class="page" id="page-transactions"></div>
  <div class="page" id="page-add"></div>

  <div class="bottom-nav">
    <button class="bottom-nav-btn active" onclick="showPage('dashboard',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Overview
    </button>
    <button class="bottom-nav-btn" onclick="showPage('spending',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      Spending
    </button>
    <button class="bottom-nav-btn" onclick="showPage('transactions',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Transactions
    </button>
    <button class="bottom-nav-btn" onclick="showPage('add',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
      Add
    </button>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Edit</div>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" id="modalSaveBtn" onclick="saveEdit()">Save</button>
    </div>
    <button class="modal-delete-btn" id="modalDeleteBtn" onclick="deleteEntry()">Delete</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
// ═══════════════════════════════════════════════════════
// FIREBASE CONFIG
// ═══════════════════════════════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref as dbRef, set, push, update, remove, onValue, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCAIlhSdnwfbry69sIwajz9PS5yJKU0QD8",
  authDomain: "budget-tracker-95985.firebaseapp.com",
  databaseURL: "https://budget-tracker-95985-default-rtdb.firebaseio.com",
  projectId: "budget-tracker-95985",
  storageBucket: "budget-tracker-95985.firebasestorage.app",
  messagingSenderId: "804020474775",
  appId: "1:804020474775:web:e8bb2ba7622d8c5a832ad2",
  measurementId: "G-B6B6BDGHTS"
};
const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const ALL_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const INCOME_SOURCES = ["Lolas'","Trinity","BioLife","Misc Income","Taken From Savings"];
const TITHE_EXEMPT = ["Taken From Savings"];
const AUTO_CALC_BUDGETS = ["Subscriptions","Tithe","Annual Expenses","Gifts"];

const DEFAULT_DISCRETIONARY = [
  {name:"Eating Out",budgeted:0},{name:"Gas",budgeted:0},{name:"Groceries",budgeted:0},
  {name:"Shopping",budgeted:0},{name:"Entertainment",budgeted:0},{name:"Snacks",budgeted:0},
  {name:"Subscriptions",budgeted:0},{name:"Tithe",budgeted:0},{name:"Additional Giving",budgeted:0},
  {name:"Education",budgeted:0},{name:"Health",budgeted:0},{name:"Car Wash",budgeted:0},
  {name:"Car Maintenance",budgeted:0},{name:"Haircut",budgeted:0},{name:"Misc Expenses",budgeted:0}
];
const DEFAULT_FIXED = [
  {name:"Health Insurance",budgeted:0},{name:"Dental Insurance",budgeted:0},
  {name:"Eye Insurance",budgeted:0},{name:"Phone Plan",budgeted:0}
];
const DEFAULT_SAVINGS = [
  {name:"General Savings",budgeted:0},{name:"Emergency Savings",budgeted:0},
  {name:"Travel Savings",budgeted:0},{name:"Investments",budgeted:0},
  {name:"Annual Expenses",budgeted:0},{name:"Gifts",budgeted:0},{name:"Extra Savings",budgeted:0}
];
const DEFAULT_INCOME_BUDGETS = {
  "Lolas'":0,"Trinity":0,"BioLife":0,"Misc Income":0,"Taken From Savings":0
};

const CAT_ICONS = {
  "Eating Out":"🍽️","Gas":"⛽","Groceries":"🛒","Shopping":"🛍️","Entertainment":"🎬",
  "Snacks":"🍿","Subscriptions":"📱","Tithe":"⛪","Additional Giving":"🤝","Education":"📚",
  "Health":"💊","Car Wash":"🚗","Car Maintenance":"🔧","Haircut":"✂️","Misc Expenses":"📦",
  "Health Insurance":"🏥","Dental Insurance":"🦷","Eye Insurance":"👁️","Phone Plan":"📞",
  "General Savings":"💰","Emergency Savings":"🚨","Travel Savings":"✈️","Investments":"📈",
  "Annual Expenses":"📅","Gifts":"🎁","Extra Savings":"🏦"
};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let currentMonth = ALL_MONTHS[new Date().getMonth()];
let currentPage = 'dashboard';
let addType = 'expense';
let DATA = {}; // { month: { incomeBudgets, discretionary, fixed, savings, expenses, income } }
let listeners = {}; // firebase listeners per month
let modalEntry = null;
let budgetEditMeta = null;

// ═══════════════════════════════════════════════════════
// FIREBASE HELPERS
// ═══════════════════════════════════════════════════════
function ref(path) { return dbRef(database, path); }

async function initMonthIfNeeded(month) {
  const snap = await get(ref(`months/${month}/initialized`));
  if (snap.val()) return;
  const updates = {};
  updates[`months/${month}/initialized`] = true;
  updates[`months/${month}/incomeBudgets`] = DEFAULT_INCOME_BUDGETS;
  DEFAULT_DISCRETIONARY.forEach((c,i) => { updates[`months/${month}/discretionary/${i}`] = c; });
  DEFAULT_FIXED.forEach((c,i) => { updates[`months/${month}/fixed/${i}`] = c; });
  DEFAULT_SAVINGS.forEach((c,i) => { updates[`months/${month}/savings/${i}`] = c; });
  await update(dbRef(database), updates);
}

async function initAllMonths() {
  // Check all months in one read
  const snap = await get(ref('months'));
  const existing = snap.val() || {};
  const updates = {};
  ALL_MONTHS.forEach(month => {
    if (!existing[month] || !existing[month].initialized) {
      updates[`months/${month}/initialized`] = true;
      updates[`months/${month}/incomeBudgets`] = DEFAULT_INCOME_BUDGETS;
      DEFAULT_DISCRETIONARY.forEach((c,i) => { updates[`months/${month}/discretionary/${i}`] = c; });
      DEFAULT_FIXED.forEach((c,i) => { updates[`months/${month}/fixed/${i}`] = c; });
      DEFAULT_SAVINGS.forEach((c,i) => { updates[`months/${month}/savings/${i}`] = c; });
    }
  });
  if (Object.keys(updates).length > 0) {
    await update(dbRef(database), updates);
  }
}

function listenToMonth(month) {
  if (listeners[month]) return;
  DATA[month] = DATA[month] || {};
  const monthRef = ref(`months/${month}`);
  const l = onValue(monthRef, snap => {
    const val = snap.val() || {};
    DATA[month] = {
      incomeBudgets: val.incomeBudgets || { ...DEFAULT_INCOME_BUDGETS },
      discretionary: val.discretionary ? Object.values(val.discretionary) : [...DEFAULT_DISCRETIONARY.map(c=>({...c}))],
      fixed: val.fixed ? Object.values(val.fixed) : [...DEFAULT_FIXED.map(c=>({...c}))],
      savings: val.savings ? Object.values(val.savings) : [...DEFAULT_SAVINGS.map(c=>({...c}))],
      expenses: val.expenses ? Object.entries(val.expenses).map(([id,v])=>({...v,id})) : [],
      income: val.income ? Object.entries(val.income).map(([id,v])=>({...v,id})) : [],
    };
    if (month === currentMonth) renderCurrentPage();
  });
  listeners[month] = true;
}

// ═══════════════════════════════════════════════════════
// DATA COMPUTATIONS
// ═══════════════════════════════════════════════════════
function getMonthData(month) {
  const d = DATA[month];
  if (!d) return null;

  const expenses = d.expenses || [];
  const income = d.income || [];

  const totalIncome = income.reduce((s,i) => s + (i.amount||0), 0);
  const tithableIncome = income.filter(i => !TITHE_EXEMPT.includes(i.source)).reduce((s,i) => s + (i.amount||0), 0);
  const titheOwed = tithableIncome * 0.1;
  const effectiveIncome = totalIncome - titheOwed;
  const totalSpent = expenses.reduce((s,e) => s + (e.amount||0), 0);
  const totalSaved = (d.savings||[]).reduce((s,sv) => s + (sv.actual||0), 0);

  const totalBudgetedIncome = Object.values(d.incomeBudgets||{}).reduce((s,v)=>s+(v||0),0);
  const totalAssigned = [
    ...(d.discretionary||[]), ...(d.fixed||[]), ...(d.savings||[])
  ].reduce((s,c) => s + (c.budgeted||0), 0);
  const unassignedBudget = Math.max(0, totalBudgetedIncome - totalAssigned);

  const catTotals = {};
  [...DEFAULT_DISCRETIONARY, ...DEFAULT_FIXED, ...DEFAULT_SAVINGS].forEach(c => catTotals[c.name] = 0);
  expenses.forEach(e => { if (catTotals[e.category] !== undefined) catTotals[e.category] += (e.amount||0); });

  return { ...d, expenses, income, totalIncome, tithableIncome, titheOwed, effectiveIncome, totalSpent, totalSaved, totalBudgetedIncome, totalAssigned, unassignedBudget, catTotals };
}

// ═══════════════════════════════════════════════════════
// FORMATTING
// ═══════════════════════════════════════════════════════
function fmt(n) {
  const abs = Math.abs(n||0);
  return '$' + abs.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

function txRow(type, entry, id) {
  const isExpense = type === 'expense';
  const iconBg = isExpense ? 'var(--red-light)' : 'var(--green-light)';
  const icon = isExpense ? (CAT_ICONS[entry.category]||'💸') : '💰';
  const label = isExpense ? entry.store : entry.source;
  const sub = entry.date ? fmtDate(entry.date) : (isExpense ? entry.category : entry.notes||'Income');
  const amtHtml = isExpense
    ? `<div class="tx-amount expense">-${fmt(entry.amount)}</div>`
    : `<div class="tx-amount income-amt">+${fmt(entry.amount)}</div>`;
  const safeId = id ? id.replace(/[^a-zA-Z0-9_-]/g,'') : '';
  return `<div class="tx-wrap" data-id="${safeId}" data-type="${type}">
    <div class="tx-actions">
      <button class="tx-action-btn edit" onclick="openTxEdit('${type}','${safeId}')">

        Edit
      </button>
      <button class="tx-action-btn del" onclick="deleteTx('${type}','${safeId}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Delete
      </button>
    </div>
    <div class="tx-item" onclick="handleTxTap(this)">
      <div class="tx-left">
        <div class="tx-icon" style="background:${iconBg}">${icon}</div>
        <div><div class="tx-store">${label}</div><div class="tx-cat">${sub}</div></div>
      </div>
      ${amtHtml}
    </div>
  </div>`;
}

// Swipe gesture
let swipeStartX = 0, swipeEl = null;
function initSwipe() {
  document.querySelectorAll('.tx-item').forEach(el => {
    el.addEventListener('touchstart', e => {
      swipeStartX = e.touches[0].clientX;
      swipeEl = el;
    }, {passive:true});
    el.addEventListener('touchmove', e => {
      if (!swipeEl) return;
      const dx = e.touches[0].clientX - swipeStartX;
      if (dx < -5) el.style.transform = `translateX(${Math.max(dx,-128)}px)`;
      else if (dx > 5) { el.style.transform = 'translateX(0)'; el.style.transition = 'transform 0.25s ease'; }
    }, {passive:true});
    el.addEventListener('touchend', e => {
      if (!swipeEl) return;
      const dx = e.changedTouches[0].clientX - swipeStartX;
      el.style.transition = 'transform 0.25s ease';
      el.style.transform = dx < -60 ? 'translateX(-128px)' : 'translateX(0)';
      swipeEl = null;
    }, {passive:true});
  });
}

function handleTxTap(el) {
  const cur = parseFloat(el.style.transform?.replace('translateX(','') || '0');
  el.style.transition = 'transform 0.25s ease';
  el.style.transform = cur < -20 ? 'translateX(0)' : 'translateX(-128px)';
}

function updateTithePreview() {
  const source = document.getElementById('incSource')?.value;
  const amount = parseFloat(document.getElementById('incAmount')?.value);
  const preview = document.getElementById('tithePreview');
  if (!preview) return;
  if (!source || isNaN(amount) || amount <= 0 || TITHE_EXEMPT.includes(source)) {
    preview.style.display = 'none'; return;
  }
  document.getElementById('titheAmt').textContent = fmt(amount * 0.1);
  document.getElementById('effectiveAmt').textContent = fmt(amount * 0.9);

async function submitExpense() {
  const store = document.getElementById('expStore').value.trim();
  const amount = parseFloat(document.getElementById('expAmount').value);
  const category = document.getElementById('expCat').value;
  const notes = document.getElementById('expNotes').value.trim();
  if (!store || isNaN(amount) || amount <= 0) { showToast('Please fill in store and amount'); return; }
  try {
    await push(ref(`months/${currentMonth}/expenses`), { store, amount, category, notes, date: new Date().toISOString() });
    showToast(`✓ Added ${fmt(amount)} at ${store}`);
    document.getElementById('expStore').value = '';
    document.getElementById('expAmount').value = '';
    document.getElementById('expNotes').value = '';
    setTimeout(() => showPage('transactions', document.querySelectorAll('.bottom-nav-btn')[2]), 600);
  } catch(e) { showToast('Error: ' + e.message); }
}

async function submitIncome() {
  const source = document.getElementById('incSource').value;
  const amount = parseFloat(document.getElementById('incAmount').value);
  const notes = document.getElementById('incNotes').value.trim();
  if (!source || isNaN(amount) || amount <= 0) { showToast('Please fill in source and amount'); return; }
  try {
    await push(ref(`months/${currentMonth}/income`), { source, amount, notes, date: new Date().toISOString() });
    showToast(`✓ Added ${fmt(amount)} from ${source}`);
    document.getElementById('incAmount').value = '';
    document.getElementById('incNotes').value = '';
    document.getElementById('tithePreview').style.display = 'none';
    setTimeout(() => showPage('transactions', document.querySelectorAll('.bottom-nav-btn')[2]), 600);
  } catch(e) { showToast('Error: ' + e.message); }
}

      </div>
      <div class="form-group"><label class="form-label">Amount</label><input class="form-input" id="meAmount" type="number" step="0.01" value="${entry.amount||0}"/></div>
      <div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="meNotes" value="${entry.notes||''}"/></div>`;
  }
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('editModal').classList.add('open');
}

async function saveTxEdit() {
  if (!modalEntry) return;
  const { type, id } = modalEntry;
  const amount = parseFloat(document.getElementById('meAmount').value);
  if (isNaN(amount) || amount <= 0) { showToast('Please enter a valid amount'); return; }
  try {
    const updates = { amount, notes: document.getElementById('meNotes').value.trim() };
    if (type === 'expense') {
      updates.store = document.getElementById('meStore').value.trim();
      updates.category = document.getElementById('meCat').value;
    } else {
      updates.source = document.getElementById('meSource').value;
    }
    await update(ref(`months/${currentMonth}/${type === 'expense' ? 'expenses' : 'income'}/${id}`), updates);
    showToast('✓ Updated');
    closeModal();
  } catch(e) { showToast('Error: ' + e.message); }
}

async function deleteTx(type, id) {
  closeAllSwipes();
  if (!confirm('Delete this transaction?')) return;
  try {
    await remove(ref(`months/${currentMonth}/${type === 'expense' ? 'expenses' : 'income'}/${id}`));
    showToast('Deleted');
  } catch(e) { showToast('Error: ' + e.message); }
}

async function deleteEntry() {
  if (!modalEntry) return;
  if (!confirm('Delete this transaction?')) return;
  const { type, id } = modalEntry;
  try {
    await remove(ref(`months/${currentMonth}/${type === 'expense' ? 'expenses' : 'income'}/${id}`));
    showToast('Deleted');
    closeModal();
  } catch(e) { showToast('Error: ' + e.message); }
}

function saveEdit() { saveTxEdit(); }

// ═══════════════════════════════════════════════════════
// BUDGET EDITING
// ═══════════════════════════════════════════════════════
function openBudgetEdit(section, idx, name, current, unassigned) {
  budgetEditMeta = { section, idx, name };
  const maxCanSet = unassigned + current;
  document.getElementById('modalTitle').textContent = 'Edit Budget: ' + name;
  document.getElementById('modalDeleteBtn').style.display = 'none';
  document.getElementById('modalSaveBtn').onclick = saveBudgetEdit;
  document.getElementById('modalBody').innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6">
      Unassigned budget: <strong style="color:var(--amber)">${fmt(unassigned)}</strong><br>
      Max you can set: <strong>${fmt(maxCanSet)}</strong>
    </div>
    <div class="form-group">
      <label class="form-label">Budget Amount</label>
      <input class="form-input" id="budgetAmt" type="number" step="0.01" value="${current}" />
    </div>`;
  document.getElementById('editModal').classList.add('open');
}

function openIncomeBudgetEdit(source, current) {
  budgetEditMeta = { section: 'incomeBudgets', source };
  document.getElementById('modalTitle').textContent = 'Expected Income: ' + source;
  document.getElementById('modalDeleteBtn').style.display = 'none';
  document.getElementById('modalSaveBtn').onclick = saveBudgetEdit;
  document.getElementById('modalBody').innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Expected amount for this source this month</div>
    <div class="form-group">
      <label class="form-label">Expected Amount</label>
      <input class="form-input" id="budgetAmt" type="number" step="0.01" value="${current}" />
    </div>`;
  document.getElementById('editModal').classList.add('open');
}

async function saveBudgetEdit() {
  const newAmt = parseFloat(document.getElementById('budgetAmt').value);
  if (isNaN(newAmt) || newAmt < 0) { showToast('Please enter a valid amount'); return; }
  const { section, idx, name, source } = budgetEditMeta;
  try {
    if (section === 'incomeBudgets') {
      await set(ref(`months/${currentMonth}/incomeBudgets/${source}`), newAmt);
    } else {
      // Check unassigned budget guard
      const d = getMonthData(currentMonth);
      const cat = [...(d.discretionary||[]),...(d.fixed||[]),...(d.savings||[])].find(c=>c.name===name);
      const oldAmt = cat ? cat.budgeted : 0;
      const maxCanSet = d.unassignedBudget + oldAmt;
      if (newAmt > maxCanSet) { showToast(`Max you can set is ${fmt(maxCanSet)}`); return; }
      await set(ref(`months/${currentMonth}/${section}/${idx}/budgeted`), newAmt);
    }
    showToast('✓ Budget updated');
    closeModal();
  } catch(e) { showToast('Error: ' + e.message); }
}

// ═══════════════════════════════════════════════════════
// MODAL / UI HELPERS
// ═══════════════════════════════════════════════════════
function closeModal() {
  document.getElementById('editModal').classList.remove('open');
  modalEntry = null;
  budgetEditMeta = null;
  document.getElementById('modalDeleteBtn').style.display = '';
  document.getElementById('modalSaveBtn').onclick = saveEdit;
}

function closeAllSwipes() {
  document.querySelectorAll('.tx-item').forEach(el => {
    el.style.transition = 'transform 0.25s ease';
    el.style.transform = 'translateX(0)';
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showPage(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (btn) btn.classList.add('active');
  currentPage = page;
  renderCurrentPage();
}

function renderCurrentPage() {
  if (currentPage === 'dashboard') renderDashboard();
  else if (currentPage === 'spending') renderSpending();
  else if (currentPage === 'transactions') renderTransactions();
  else if (currentPage === 'add') renderAdd();
}

function selectMonth(month) {
  currentMonth = month;
  document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-month="${month}"]`)?.classList.add('active');
  document.getElementById('navMonth').textContent = month;
  listenToMonth(month);
  renderCurrentPage();
}

function refreshAll() {
  showToast('Data is live — always up to date!');
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
async function init() {
  try {
    // Init all months in one batch read/write
    await initAllMonths();

    // Build month tabs
    const tabs = document.getElementById('monthTabs');
    const now = new Date();
    const currentCalMonth = ALL_MONTHS[now.getMonth()];
    ALL_MONTHS.forEach(m => {
      const btn = document.createElement('button');
      const isFuture = ALL_MONTHS.indexOf(m) > ALL_MONTHS.indexOf(currentCalMonth);
      btn.className = 'month-tab' + (m === currentMonth ? ' active' : '') + (isFuture ? ' future' : '');
      btn.textContent = m.slice(0,3);
      btn.setAttribute('data-month', m);
      btn.onclick = () => selectMonth(m);
      tabs.appendChild(btn);
    });

    document.getElementById('navMonth').textContent = currentMonth;

    // Start listening to current month
    listenToMonth(currentMonth);

    // Also preload adjacent months for chart
    const idx = ALL_MONTHS.indexOf(currentMonth);
    for (let i = 0; i <= idx; i++) listenToMonth(ALL_MONTHS[i]);

    // Show app
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'block';
    renderDashboard();

  } catch(e) {
    document.getElementById('loadingScreen').innerHTML = `
      <div style="text-align:center;padding:40px 24px">
        <div style="font-size:36px;margin-bottom:16px">⚠️</div>
        <div style="font-family:'Playfair Display',serif;font-size:22px;margin-bottom:12px;color:var(--text)">Connection Error</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6">${e.message}</div>
        <button onclick="location.reload()" style="padding:12px 28px;background:var(--green);color:white;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer">Try Again</button>
      </div>`;
  }
}

init();

// Expose functions to global scope (required when using type="module")
window.showPage = showPage;
window.selectMonth = selectMonth;
window.setAddType = setAddType;
window.updateTithePreview = updateTithePreview;
window.submitExpense = submitExpense;
window.submitIncome = submitIncome;
window.openTxEdit = openTxEdit;
window.deleteTx = deleteTx;
window.deleteEntry = deleteEntry;
window.saveEdit = saveEdit;
window.handleTxTap = handleTxTap;
window.openBudgetEdit = openBudgetEdit;
window.openIncomeBudgetEdit = openIncomeBudgetEdit;
window.saveBudgetEdit = saveBudgetEdit;
window.closeModal = closeModal;
window.refreshAll = refreshAll;
</script>
</body>
</html>
