<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Budget</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f0;--surface:#fff;--border:#e8e4dc;--text:#1a1814;--muted:#8a8278;
  --green:#2d6a4f;--green-light:#e8f5ee;--red:#c0392b;--red-light:#fdf0ee;
  --amber:#b8860b;--amber-light:#fdf8e8;--blue:#1a4a7a;--blue-light:#e8f0f8;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;padding-bottom:84px}
#loadingScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.loading-title{font-family:'Playfair Display',serif;font-size:32px;color:var(--green)}
.loading-dots{display:flex;gap:6px}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 1.2s infinite}
.loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
#appShell{display:none}
.nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.nav-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--green)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-month{font-size:11px;color:var(--muted);font-weight:500}
.nav-icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex}
.month-tabs{display:flex;gap:4px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border)}
.month-tabs::-webkit-scrollbar{display:none}
.month-tab{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'Sora',sans-serif;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s}
.month-tab.active{background:var(--green);color:white;border-color:var(--green)}
.month-tab.future{opacity:.5}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100}
.bottom-nav-btn{flex:1;padding:10px 2px 8px;border:none;background:none;font-family:'Sora',sans-serif;font-size:9px;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .2s}
.bottom-nav-btn.active{color:var(--green)}
.bottom-nav-btn svg{width:20px;height:20px}
.page{display:none;padding:16px}
.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.section-divider{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
.summary-hero{background:var(--green);color:white;border-radius:16px;padding:20px;margin-bottom:12px}
.hero-label{font-size:11px;opacity:.7;margin-bottom:4px}
.hero-amount{font-family:'Playfair Display',serif;font-size:36px;margin-bottom:16px}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hero-item{background:rgba(255,255,255,.12);border-radius:8px;padding:10px}
.hero-item-label{font-size:10px;opacity:.7;margin-bottom:2px}
.hero-item-value{font-size:15px;font-weight:600}
.progress-item{margin-bottom:14px}
.progress-item:last-child{margin-bottom:0}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.progress-name{font-size:13px;font-weight:500}
.progress-right{display:flex;align-items:center;gap:8px}
.progress-amounts{font-size:11px;color:var(--text);font-weight:500}
.progress-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease}
.fill-ok{background:var(--green)}.fill-warn{background:var(--amber)}.fill-over,.fill-red{background:var(--red)}
.fill-debt{background:var(--red)}
.savings-item{margin-bottom:14px}.savings-item:last-child{margin-bottom:0}
.savings-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.savings-name{font-size:13px;font-weight:500}
.savings-val{font-size:13px;font-weight:600;color:var(--text)}
.savings-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.savings-fill{height:100%;background:var(--green);border-radius:4px;transition:width .5s ease}
.edit-btn{background:var(--green-light);border:1px solid var(--green);border-radius:6px;padding:3px 10px;font-size:10px;font-family:'Sora',sans-serif;cursor:pointer;color:var(--green);white-space:nowrap;font-weight:600}
.auto-label{font-size:9px;color:var(--muted);font-style:italic}
.tx-wrap{position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.tx-wrap:last-child{border-bottom:none}
.tx-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;background:var(--surface);position:relative;z-index:1;transition:transform .25s ease;touch-action:pan-y;user-select:none}
.tx-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:stretch;z-index:0}
.tx-action-btn{width:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;border:none;cursor:pointer;font-family:'Sora',sans-serif}
.tx-action-btn.edit{background:var(--amber);color:white}.tx-action-btn.del{background:var(--red);color:white}
.tx-action-btn svg{width:16px;height:16px}
.tx-left{display:flex;align-items:center;gap:10px}
.tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-store{font-size:13px;font-weight:500}.tx-cat{font-size:11px;color:var(--muted)}
.tx-amount{font-size:14px;font-weight:600}
.tx-amount.expense{color:var(--red)}.tx-amount.income-amt{color:var(--green)}.tx-amount.savings-amt{color:var(--blue)}
.tx-hint{font-size:10px;color:var(--muted);text-align:center;padding:4px 0 6px;font-style:italic}
.tx-notes{font-size:11px;color:var(--amber);font-style:italic;margin-top:1px}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:120px;padding-top:8px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.chart-bar-wrap{flex:1;display:flex;align-items:flex-end;width:100%;gap:2px;height:100%}
.chart-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;align-self:flex-end}
.income-bar{background:var(--green);opacity:.85}.spent-bar{background:var(--border)}
.chart-label{font-size:9px;color:var(--muted)}
.chart-legend{display:flex;gap:12px;margin-top:10px;justify-content:center}
.chart-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.chart-legend-dot{width:8px;height:8px;border-radius:2px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block}
.form-input,.form-select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;background:var(--surface);color:var(--text);appearance:none;-webkit-appearance:none}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--green)}
.form-submit{width:100%;padding:14px;background:var(--green);color:white;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.type-toggle{display:flex;gap:8px;margin-bottom:16px}
.type-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;background:none;font-family:'Sora',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .2s}
.type-btn.active.expense{background:var(--red-light);border-color:var(--red);color:var(--red)}
.type-btn.active.income{background:var(--green-light);border-color:var(--green);color:var(--green)}
.type-btn.active.savings{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.tithe-preview{font-size:12px;color:var(--muted);margin:-8px 0 12px;padding:8px 12px;background:var(--bg);border-radius:8px;display:none;line-height:1.6}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;transform:translateY(100%);transition:transform .3s ease;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-cancel{flex:1;padding:13px;border:1px solid var(--border);border-radius:10px;background:none;font-family:'Sora',sans-serif;font-size:14px;cursor:pointer}
.modal-save{flex:2;padding:13px;background:var(--green);color:white;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.modal-delete-btn{width:100%;padding:13px;background:var(--red-light);color:var(--red);border:1px solid var(--red);border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:600;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.banner{border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.banner.amber{background:var(--amber-light);border:1px solid var(--amber)}
.banner.red{background:var(--red-light);border:1px solid var(--red)}
.banner-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.banner.amber .banner-label{color:var(--amber)}.banner.red .banner-label{color:var(--red)}
.banner-amount{font-size:20px;font-weight:700}
.banner.amber .banner-amount{color:var(--amber)}.banner.red .banner-amount{color:var(--red)}
.banner-sub{font-size:11px;color:var(--muted);margin-top:1px}
.banner-btn{color:white;border:none;border-radius:8px;padding:8px 14px;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.banner.amber .banner-btn{background:var(--amber)}.banner.red .banner-btn{background:var(--red)}
.empty-state{text-align:center;padding:30px 20px;color:var(--muted);font-size:13px}
/* PIE CHART */
.pie-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.pie-toggle{display:flex;gap:6px;margin-bottom:4px}
.pie-toggle-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:none;font-family:'Sora',sans-serif;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s}
.pie-toggle-btn.active{background:var(--green);color:white;border-color:var(--green)}
.pie-svg-wrap{position:relative;width:180px;height:180px}


.pie-legend{display:flex;flex-direction:column;gap:6px;width:100%}
.pie-legend-item{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12px}
.pie-legend-left{display:flex;align-items:center;gap:8px}
.pie-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.pie-legend-name{color:var(--text)}
.pie-legend-pct{color:var(--muted);font-size:11px}
.pie-legend-amt{font-weight:600;color:var(--text)}
/* MONTH POPUP */
.month-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.month-popup-overlay.open{opacity:1;pointer-events:all}
.month-popup{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;transform:translateY(100%);transition:transform .3s ease}
.month-popup-overlay.open .month-popup{transform:translateY(0)}
.month-popup-title{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:4px}
.month-popup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.month-popup-item{background:var(--bg);border-radius:10px;padding:12px}
.month-popup-item-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.month-popup-item-value{font-size:17px;font-weight:700}
.month-popup-close{width:100%;padding:12px;background:var(--green);color:white;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
/* GIFT TAB */
.gift-section{margin-bottom:8px}
.gift-section-header{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:2px solid var(--border);margin-bottom:8px}
.gift-section-title{font-family:'Playfair Display',serif;font-size:18px}
.gift-section-meta{font-size:12px;color:var(--muted)}
.gift-person{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.gift-person:last-child{border-bottom:none}
.gift-person-name{font-size:13px;font-weight:500}
.gift-person-date{font-size:11px;color:var(--muted)}
.gift-person-right{display:flex;align-items:center;gap:8px}
.gift-budget{font-size:13px;font-weight:600}
.gift-spent{font-size:11px;color:var(--muted)}
.gift-remaining.ok{color:var(--green)}.gift-remaining.over{color:var(--red)}
.birthday-soon{background:var(--amber-light);border-radius:6px;padding:2px 6px;font-size:9px;font-weight:600;color:var(--amber)}
/* SETTINGS */
.settings-source-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.settings-source-row:last-child{border-bottom:none}
.settings-source-name{font-size:13px;font-weight:500}
.settings-source-meta{font-size:11px;color:var(--muted)}
.settings-btns{display:flex;gap:6px}
.tag-btn{font-size:10px;padding:3px 8px;border-radius:6px;font-family:'Sora',sans-serif;cursor:pointer;border:1px solid}
.tag-btn.exempt-on{background:var(--amber-light);border-color:var(--amber);color:var(--amber)}
.tag-btn.exempt-off{background:none;border-color:var(--border);color:var(--muted)}
.tag-btn.remove{background:var(--red-light);border-color:var(--red);color:var(--red)}
.sub-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.sub-row:last-child{border-bottom:none}
.sub-name{font-size:13px;font-weight:500}
.sub-amount{font-size:13px;font-weight:600;color:var(--green)}
.sub-period{font-size:11px;color:var(--muted)}
.inline-add{display:flex;gap:8px;margin-top:12px}
.inline-add input{flex:1}
.inline-add .small-input{width:90px;flex:none}
.add-btn{padding:12px 14px;background:var(--green);color:white;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
</style>
</head>
<body>
<div id="loadingScreen">
  <div class="loading-title">Budget</div>
  <div style="font-size:13px;color:var(--muted)">Loading your data...</div>
  <div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
</div>

<div id="appShell">
  <div class="nav">
    <div class="nav-title">Budget</div>
    <div class="nav-right">
      <div class="nav-month" id="navMonth"></div>
    </div>
  </div>
  <div class="month-tabs" id="monthTabs"></div>
  <div class="page active" id="page-dashboard"></div>
  <div class="page" id="page-spending"></div>
  <div class="page" id="page-transactions"></div>
  <div class="page" id="page-add"></div>
  <div class="page" id="page-gifts"></div>
  <div class="page" id="page-subscriptions"></div>
  <div class="page" id="page-settings"></div>
  <div class="bottom-nav">
    <button class="bottom-nav-btn active" onclick="showPage('dashboard',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Overview
    </button>
    <button class="bottom-nav-btn" onclick="showPage('spending',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      Spending
    </button>
    <button class="bottom-nav-btn" onclick="showPage('transactions',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Transactions
    </button>
    <button class="bottom-nav-btn" onclick="showPage('add',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
      Add
    </button>
    <button class="bottom-nav-btn" onclick="showPage('gifts',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>
      Gifts
    </button>
    <button class="bottom-nav-btn" onclick="showPage('subscriptions',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      Subs
    </button>
    <button class="bottom-nav-btn" onclick="showPage('settings',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Settings
    </button>
  </div>
</div>

<div class="month-popup-overlay" id="monthPopup" onclick="closeMonthPopup(event)">
  <div class="month-popup">
    <div class="month-popup-title" id="popupMonth"></div>
    <div style="font-size:12px;color:var(--muted)" id="popupSub"></div>
    <div class="month-popup-grid" id="popupGrid"></div>
    <div id="popupTopCats"></div>
    <button class="month-popup-close" onclick="closeMonthPopup()">Close</button>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Edit</div>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" id="modalSaveBtn">Save</button>
    </div>
    <button class="modal-delete-btn" id="modalDeleteBtn">Delete</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

// ── FIREBASE HELPERS ───────────────────────────────────
async function initAllMonths() {
  const snap = await get(ref('months'));
  const existing = snap.val() || {};
  const updates = {};
  ALL_MONTHS.forEach(month => {
    if (!existing[month] || !existing[month].initialized) {
      updates[`months/${month}/initialized`] = true;
      updates[`months/${month}/incomeBudgets`] = Object.fromEntries(INCOME_SOURCES.map(s=>[s.replace(/[^a-zA-Z0-9]/g,'_'),0]));
      DEFAULT_DISCRETIONARY.forEach((c,i) => { updates[`months/${month}/discretionary/${i}`] = {...c}; });
      DEFAULT_FIXED.forEach((c,i) => { updates[`months/${month}/fixed/${i}`] = {...c}; });
      DEFAULT_SAVINGS.forEach((c,i) => { updates[`months/${month}/savings/${i}`] = {...c}; });
    }
  });
  if (Object.keys(updates).length > 0) await update(dbRef(database), updates);
}

function listenToMonth(month) {
  if (listeners[month]) return;
  listeners[month] = true;
  onValue(ref(`months/${month}`), async snap => {
    const val = snap.val() || {};
    DATA[month] = {
      incomeBudgets: val.incomeBudgets || {},
      discretionary: val.discretionary ? Object.values(val.discretionary) : DEFAULT_DISCRETIONARY.map(c=>({...c})),
      fixed: val.fixed ? Object.values(val.fixed) : DEFAULT_FIXED.map(c=>({...c})),
      savings: val.savings ? Object.values(val.savings) : DEFAULT_SAVINGS.map(c=>({...c})),
      expenses: val.expenses ? Object.entries(val.expenses).map(([id,v])=>({...v,id})) : [],
      income: val.income ? Object.entries(val.income).map(([id,v])=>({...v,id})) : [],
    };

    // Auto-adjust income budgets if actual exceeds expected
    const d = DATA[month];
    const actualBySrc = {};
    (d.income||[]).forEach(i=>{ actualBySrc[i.source]=(actualBySrc[i.source]||0)+(i.amount||0); });
    const updates = {};
    let incomeBudgetChanged = false;
    INCOME_SOURCES.forEach(src => {
      const key = src.replace(/[^a-zA-Z0-9]/g,'_');
      const budgeted = (d.incomeBudgets||{})[key]||0;
      const actual = actualBySrc[src]||0;
      if (actual > budgeted) {
        updates[`months/${month}/incomeBudgets/${key}`] = actual;
        incomeBudgetChanged = true;
      }
    });
    if (incomeBudgetChanged) await update(dbRef(database), updates);

    // Auto-adjust overspent categories from unassigned budget
    if (month === currentMonth) await autoRebalanceOverspent(month);

    if (month === currentMonth) renderCurrentPage();
  });
}

// ── DATA COMPUTATIONS ──────────────────────────────────
function calcSubscriptions(month) {
  const subs = SETTINGS.subscriptions || [];
  const monthIdx = month ? ALL_MONTHS.indexOf(month) : ALL_MONTHS.indexOf(currentMonth);
  
  function isActiveInMonth(s) {
    // No start/end = applies to all months
    const startIdx = s.startMonth ? ALL_MONTHS.indexOf(s.startMonth) : -1;
    const endIdx = s.endMonth ? ALL_MONTHS.indexOf(s.endMonth) : 999;
    if (startIdx === -1 && endIdx === 999) return true; // no dates set, always active
    if (startIdx !== -1 && monthIdx < startIdx) return false; // before start
    if (endIdx !== 999 && monthIdx > endIdx) return false; // after end
    return true;
  }

  const activeSubs = subs.filter(isActiveInMonth);
  const monthly = activeSubs.filter(s=>s.period==='monthly').reduce((t,s)=>t+(s.amount||0),0);
  const annual = activeSubs.filter(s=>s.period==='annual').reduce((t,s)=>t+(s.amount||0),0);
  return { monthly, annualPerMonth: annual/12, total: monthly + annual/12, activeSubs };
}

function calcGiftMonthly() {
  const g = SETTINGS.gifts || { christmas: [], birthdays: [] };
  const xmas = (g.christmas||[]).reduce((t,p)=>t+(p.budget||0),0);
  const bday = (g.birthdays||[]).reduce((t,p)=>t+(p.budget||0),0);
  return (xmas + bday) / 12;
}

function getMonthData(month) {
  const d = DATA[month];
  if (!d) return null;
  const expenses = d.expenses || [];
  const income = d.income || [];
  const totalIncome = income.reduce((s,i)=>s+(i.amount||0),0);
  const tithableIncome = income.filter(i=>!TITHE_EXEMPT.includes(i.source)).reduce((s,i)=>s+(i.amount||0),0);
  const titheOwed = tithableIncome * 0.1;
  const effectiveIncome = totalIncome - titheOwed;
  // Only count non-savings expenses as "spent"
  // ALL expenses (including savings and tithe) count against available money
  const totalSpent = expenses.reduce((s,e)=>s+(e.amount||0),0);
  const totalSavedLogged = expenses.filter(e=>e.type==='savings').reduce((s,e)=>s+(e.amount||0),0);
  const tithePaid = expenses.filter(e=>e.category==='Tithe').reduce((s,e)=>s+(e.amount||0),0);
  const titheRemaining = Math.max(0, titheOwed - tithePaid);

  // Only sum keys that match known income sources to avoid double-counting stale keys
  const knownKeys = INCOME_SOURCES.map(s=>s.replace(/[^a-zA-Z0-9]/g,'_'));
  const totalBudgetedIncome = knownKeys.reduce((s,k)=>s+((d.incomeBudgets||{})[k]||0),0);
  
  // Auto-calculate subscriptions & gifts into budget lines
  const subCalc = calcSubscriptions(month);
  const giftMonthly = calcGiftMonthly();

  // Tithe budget = 10% of expected (budgeted) non-exempt income
  // This matches your sheet: budget is based on what you EXPECT to earn
  const exemptBudgeted = TITHE_EXEMPT.reduce((s,src)=>{
    const k = src.replace(/[^a-zA-Z0-9]/g,'_');
    return s + ((d.incomeBudgets||{})[k]||0);
  }, 0);
  const tithableBudgeted = totalBudgetedIncome - exemptBudgeted;
  const titheBudget = tithableBudgeted * 0.1;

  // Apply auto budgets
  const discretionary = (d.discretionary||[]).map(c => {
    if (c.name === 'Subscriptions') return {...c, budgeted: subCalc.monthly, autoCalc: true};
    if (c.name === 'Tithe') return {...c, budgeted: titheBudget, autoCalc: true};
    return c;
  });
  const savings = (d.savings||[]).map(s => {
    if (s.name === 'Annual Expenses') return {...s, budgeted: subCalc.annualPerMonth, autoCalc: true};
    if (s.name === 'Gifts') return {...s, budgeted: giftMonthly, autoCalc: true};
    return s;
  });

  // Unassigned budget = expected income (after tithe) minus everything assigned to categories
  // Expected income after tithe = totalBudgetedIncome * 0.9 (approximate)
  // But tithe is already included as a budget line, so use totalBudgetedIncome directly
  const totalAssigned = [...discretionary,...(d.fixed||[]),...savings].reduce((s,c)=>s+(c.budgeted||0),0);
  const unassignedBudget = Math.max(0, totalBudgetedIncome - totalAssigned);

  const catTotals = {};
  [...DEFAULT_DISCRETIONARY,...DEFAULT_FIXED].forEach(c=>catTotals[c.name]=0);
  expenses.filter(e=>e.type!=='savings').forEach(e=>{if(catTotals[e.category]!==undefined)catTotals[e.category]+=(e.amount||0);});
  
  // Savings actuals
  const savingsTotals = {};
  expenses.filter(e=>e.type==='savings').forEach(e=>{savingsTotals[e.category]=(savingsTotals[e.category]||0)+(e.amount||0);});

  const result = {...d, discretionary, savings, expenses, income, totalIncome, tithableIncome, titheOwed, titheRemaining, tithePaid, effectiveIncome, totalSpent, totalSavedLogged, totalBudgetedIncome, totalAssigned, unassignedBudget, catTotals, savingsTotals, subCalc, giftMonthly};
  window._debugData = result; // debug
  return result;
}

// ── FORMATTING ─────────────────────────────────────────
function fmt(n){const a=Math.abs(n||0);return '$'+a.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function fmtDate(iso){if(!iso)return '';const d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}
function monthsUntilBirthday(dateStr) {
  if (!dateStr) return null;
  const [m,dy] = dateStr.split('/').map(Number);
  const now = new Date();
  let bday = new Date(now.getFullYear(), m-1, dy);
  if (bday < now) bday = new Date(now.getFullYear()+1, m-1, dy);
  const diff = (bday - now) / (1000*60*60*24*30);
  return diff;
}

    });
    html += `</div>`;
  }
  document.getElementById('page-dashboard').innerHTML = html;
}

// ── RENDER SPENDING ────────────────────────────────────
function renderSpending() {
  const d = getMonthData(currentMonth);
  if (!d) { document.getElementById('page-spending').innerHTML = '<div class="empty-state">Loading...</div>'; return; }
  let html = '';

  // Available to spend = effective income minus everything spent so far (excl tithe already in effectiveIncome)
  const availableToSpend = d.effectiveIncome - (d.totalSpent - d.tithePaid);
  const spendColor = availableToSpend >= 0 ? 'var(--green)' : 'var(--red)';
  html += `<div class="card" style="margin-bottom:12px;background:var(--green);border-color:var(--green)">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px">
          ${availableToSpend >= 0 ? 'Available to Spend' : 'Overspent'}
        </div>
        <div style="font-family:'Playfair Display',serif;font-size:28px;color:${availableToSpend>=0?'white':'#ffaaaa'}">${availableToSpend>=0?'+':''}${fmt(availableToSpend)}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:2px">${fmt(d.effectiveIncome)} after tithe − ${fmt(d.totalSpent - d.tithePaid)} spent</div>
      </div>
    </div>
  </div>`;

  if (d.titheRemaining > 0) {
    html += `<div class="banner red" style="margin-bottom:12px">
      <div><div class="banner-label">Tithe Still Owed</div><div class="banner-amount">${fmt(d.titheRemaining)}</div></div>
      <button class="banner-btn" onclick="quickLogTithe(${d.titheRemaining})">Log Tithe</button>
    </div>`;
  }
  if (d.unassignedBudget > 0) {
    html += `<div class="banner amber" style="margin-bottom:12px">
      <div><div class="banner-label">Unassigned Budget</div><div class="banner-amount">${fmt(d.unassignedBudget)}</div></div>
    </div>`;
  }

  // Income budgets vs actual
  // Group actual income by source
  const actualBySrc = {};
  (d.income||[]).forEach(i=>{ actualBySrc[i.source]=(actualBySrc[i.source]||0)+(i.amount||0); });
  const totalActualIncome = Object.values(actualBySrc).reduce((s,v)=>s+v,0);
  const totalBudgetedInc = d.totalBudgetedIncome;
  const totalIncDiff = totalActualIncome - totalBudgetedInc;

  html += `<div class="section-divider">Income</div><div class="card">`;
  // Summary row
  html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0 12px;border-bottom:1px solid var(--border);margin-bottom:8px">
    <div style="font-size:12px;font-weight:600;color:var(--muted)">Total</div>
    <div style="display:flex;gap:16px;align-items:center;font-size:12px">
      <div style="text-align:right"><div style="color:var(--muted);font-size:10px">Expected</div><div style="font-weight:600">${fmt(totalBudgetedInc)}</div></div>
      <div style="text-align:right"><div style="color:var(--muted);font-size:10px">Actual</div><div style="font-weight:600;color:var(--green)">${fmt(totalActualIncome)}</div></div>
      <div style="text-align:right"><div style="color:var(--muted);font-size:10px">Diff</div><div style="font-weight:600;color:${totalIncDiff>=0?'var(--green)':'var(--red)'}">${totalIncDiff>=0?'+':''}${fmt(totalIncDiff)}</div></div>
    </div>
  </div>`;
  INCOME_SOURCES.forEach(src=>{
    const key = src.replace(/[^a-zA-Z0-9]/g,'_');
    const budgeted = (d.incomeBudgets||{})[key]||0;
    const actual = actualBySrc[src]||0;
    const diff = actual - budgeted;
    const diffColor = diff>=0?'var(--green)':'var(--red)';
    html+=`<div class="progress-item"><div class="progress-header">
      <span class="progress-name">💵 ${src}</span>
      <div class="progress-right" style="gap:12px">
        <div style="text-align:right"><div style="font-size:10px;color:var(--muted)">Expected</div><div style="font-size:12px;font-weight:500">${fmt(budgeted)}</div></div>
        <div style="text-align:right"><div style="font-size:10px;color:var(--muted)">Actual</div><div style="font-size:12px;font-weight:500;color:var(--green)">${fmt(actual)}</div></div>
        <div style="text-align:right"><div style="font-size:10px;color:var(--muted)">Diff</div><div style="font-size:12px;font-weight:600;color:${diffColor}">${diff>=0?'+':''}${fmt(diff)}</div></div>
        <button class="edit-btn income-edit-btn" data-src="${src}" data-key="${key}" data-budgeted="${budgeted}">Edit</button>
      </div></div></div>`;
  });
  html += `</div>`;

  // Tithe — red debt bar
  html += `<div class="section-divider">Tithe</div><div class="card">`;
  const titheOwed = d.titheOwed, tithePaid = d.tithePaid, titheRem = d.titheRemaining;
  const tithePct = titheOwed>0 ? Math.min(tithePaid/titheOwed*100,100) : 0;
  html += `<div class="progress-item"><div class="progress-header">
    <span class="progress-name">⛪ Tithe (auto)</span>
    <span class="progress-amounts">${fmt(tithePaid)} paid / ${fmt(titheOwed)} owed</span>
  </div>
  <div class="progress-track" style="background:var(--red-light)">
    <div class="progress-fill fill-debt" style="width:${tithePct}%"></div>
  </div>
  <div style="font-size:11px;color:var(--red);margin-top:4px">${titheRem>0?fmt(titheRem)+' still owed':'✓ Fully paid'}</div>
  </div>`;
  html += `</div>`;

  // Subscriptions summary
  const sc = d.subCalc;
  html += `<div class="section-divider">Subscriptions</div><div class="card">`;
  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div><div style="font-size:13px;font-weight:500">📱 Monthly total</div><div style="font-size:11px;color:var(--muted)">Auto-calculated from your subscriptions</div></div>
    <div style="font-size:16px;font-weight:700;color:var(--green)">${fmt(sc.monthly)}/mo</div>
  </div>`;
  const subActual = d.catTotals['Subscriptions']||0;
  const subPct = sc.monthly>0?Math.min(subActual/sc.monthly*100,100):0;
  html += `<div class="progress-track"><div class="progress-fill fill-ok" style="width:${subPct}%"></div></div>
  <div style="font-size:11px;color:var(--muted);margin-top:4px">${fmt(subActual)} logged / ${fmt(sc.monthly)} expected</div>`;
  html += `</div>`;

  // Discretionary (skip Tithe and Subscriptions — handled above)
  html += `<div class="section-divider">Discretionary</div><div class="card">`;
  d.discretionary.filter(c=>c.name!=='Tithe'&&c.name!=='Subscriptions').forEach((cat,i)=>{
    const actual = d.catTotals[cat.name]||0;
    const budget = cat.budgeted||0;
    const pct = budget>0?Math.min(actual/budget*100,100):actual>0?100:0;
    const status = budget===0?'fill-ok':actual>=budget?'fill-over':actual>=budget*.8?'fill-warn':'fill-ok';
    const discZero = budget === 0 && actual === 0;
    const discRem = budget - actual;
    const discRemColor = discRem < 0 ? 'var(--red)' : discRem === 0 ? 'var(--muted)' : 'var(--green)';
    html+=`<div class="progress-item"><div class="progress-header">
      <span class="progress-name" style="${discZero?'color:var(--muted);text-decoration:line-through':''}">${CAT_ICONS[cat.name]||'•'} ${cat.name}</span>
      <div class="progress-right">
        <div style="text-align:right">
          <div style="font-size:11px;font-weight:500">${fmt(actual)} / ${fmt(budget)}</div>
          ${!discZero?`<div style="font-size:10px;color:${discRemColor};font-weight:600">${discRem>=0?fmt(discRem)+' left':fmt(Math.abs(discRem))+' over'}</div>`:''}
        </div>
        <button class="edit-btn spend-edit-btn" data-section="discretionary" data-name="${cat.name}" data-budget="${budget}" data-unassigned="${d.unassignedBudget}">Edit</button>
      </div></div>
      ${!discZero?`<div class="progress-track"><div class="progress-fill ${status}" style="width:${pct}%"></div></div>`:''}
    </div>`;
  });
  html += `</div>`;

  // Fixed
  html += `<div class="section-divider">Fixed Expenses</div><div class="card">`;
  d.fixed.forEach(f=>{
    const actual = d.catTotals[f.name]||f.actual||0;
    const budget = f.budgeted||0;
    const pct = budget>0?Math.min(actual/budget*100,100):0;
    const fixZero = budget === 0 && actual === 0;
    const fixRem = budget - actual;
    const fixRemColor = fixRem < 0 ? 'var(--red)' : fixRem === 0 ? 'var(--muted)' : 'var(--green)';
    html+=`<div class="progress-item"><div class="progress-header">
      <span class="progress-name" style="${fixZero?'color:var(--muted);text-decoration:line-through':''}">${CAT_ICONS[f.name]||'🔒'} ${f.name}</span>
      <div class="progress-right">
        <div style="text-align:right">
          <div style="font-size:11px;font-weight:500" style="${fixZero?'color:var(--muted)':''}">${fmt(actual)} / ${fmt(budget)}</div>
          ${!fixZero?`<div style="font-size:10px;color:${fixRemColor};font-weight:600">${fixRem>=0?fmt(fixRem)+' left':fmt(Math.abs(fixRem))+' over'}</div>`:''}
        </div>
        <button class="edit-btn spend-edit-btn" data-section="fixed" data-name="${f.name}" data-budget="${budget}" data-unassigned="${d.unassignedBudget}">Edit</button>
      </div></div>
      ${!fixZero?`<div class="progress-track"><div class="progress-fill ${actual>budget&&budget>0?'fill-over':'fill-ok'}" style="width:${pct}%"></div></div>`:''}
    </div>`;
  });
  html += `</div>`;

  // Savings
  html += `<div class="section-divider">Savings</div><div class="card">`;
  d.savings.forEach(s=>{
    const actual = d.savingsTotals[s.name]||0;
    const budget = s.budgeted||0;
    const pct = budget>0?Math.min(actual/budget*100,100):0;
    const isAuto = s.autoCalc;
    const savZero = budget === 0 && actual === 0;
    const savRem = budget - actual;
    const savRemColor = savRem < 0 ? 'var(--red)' : savRem === 0 ? 'var(--muted)' : 'var(--green)';
    html+=`<div class="savings-item"><div class="savings-header">
      <span class="savings-name" style="${savZero?'color:var(--muted);text-decoration:line-through':''}">${CAT_ICONS[s.name]||'💰'} ${s.name}${isAuto?'<span class="auto-label" style="margin-left:6px">auto</span>':''}</span>
      <div class="progress-right">
        <div style="text-align:right">
          <div style="font-size:11px;font-weight:600;color:${savZero?'var(--muted)':'var(--text)'}">${fmt(actual)} / ${fmt(budget)}</div>
          ${!savZero?`<div style="font-size:10px;color:${savRemColor};font-weight:600">${savRem>=0?fmt(savRem)+' left':fmt(Math.abs(savRem))+' over'}</div>`:''}
        </div>
        ${!isAuto?`<button class="edit-btn spend-edit-btn" data-section="savings" data-name="${s.name}" data-budget="${budget}" data-unassigned="${d.unassignedBudget}">Edit</button>`:''}
      </div></div>
      ${!savZero?`<div class="savings-track"><div class="savings-fill" style="width:${pct}%"></div></div>`:''}
    </div>`;
  });
  html += `</div>`;

  document.getElementById('page-spending').innerHTML = html;

  // Attach edit listeners
  document.querySelectorAll('.income-edit-btn').forEach(btn=>{
    btn.addEventListener('click',()=>openIncomeBudgetEdit(btn.dataset.src, btn.dataset.key, parseFloat(btn.dataset.budgeted)));
  });
  document.querySelectorAll('.spend-edit-btn').forEach(btn=>{
    btn.addEventListener('click',()=>openBudgetEdit(btn.dataset.section, btn.dataset.name, parseFloat(btn.dataset.budget), parseFloat(btn.dataset.unassigned)));
  });
}

// ── RENDER TRANSACTIONS ────────────────────────────────
function renderTransactions() {
  const d = getMonthData(currentMonth);
  if (!d) { document.getElementById('page-transactions').innerHTML = '<div class="empty-state">Loading...</div>'; return; }
  const sortedExp = [...d.expenses].sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  const sortedInc = [...d.income].sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));

  function txRowHtml(tx, isExp) {
    const isSav = isExp && tx.type==='savings';
    const iconBg = isSav?'var(--blue-light)':isExp?'var(--red-light)':'var(--green-light)';
    const icon = isSav?(CAT_ICONS[tx.category]||'💰'):isExp?(CAT_ICONS[tx.category]||'💸'):'💰';
    const label = isExp?tx.store:tx.source;
    const sub = tx.date?fmtDate(tx.date):(isExp?tx.category:tx.notes||'Income');
    const notesLine = (tx.notes&&tx.notes!==sub) ? `<div class="tx-notes">${tx.notes}</div>` : '';
    const amtClass = isSav?'savings-amt':isExp?'expense':'income-amt';
    const amtPrefix = isSav?'→':isExp?'-':'+';
    const safeId = (tx.id||'').replace(/[^a-zA-Z0-9_-]/g,'');
    const dbPath = isExp?'expenses':'income';
    return `<div class="tx-wrap" data-id="${safeId}" data-type="${dbPath}">
      <div class="tx-actions">
        <button class="tx-action-btn edit" onclick="openTxEdit('${dbPath}','${safeId}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit
        </button>
        <button class="tx-action-btn del" onclick="deleteTx('${dbPath}','${safeId}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>Delete
        </button>
      </div>
      <div class="tx-item" onclick="handleTxTap(this)">
        <div class="tx-left">
          <div class="tx-icon" style="background:${iconBg}">${icon}</div>
          <div><div class="tx-store">${label||''}</div><div class="tx-cat">${sub}</div>${notesLine}</div>
        </div>
        <div class="tx-amount ${amtClass}">${amtPrefix}${fmt(tx.amount)}</div>
      </div>
    </div>`;
  }

  let html = '';
  // Expenses section
  html += `<div class="section-divider" style="display:flex;justify-content:space-between;align-items:center">
    <span>Expenses (${sortedExp.length})</span>
    <span style="font-weight:400;color:var(--red)">${fmt(sortedExp.reduce((s,e)=>s+(e.amount||0),0))}</span>
  </div>`;
  if (sortedExp.length === 0) {
    html += `<div class="card"><div class="empty-state" style="padding:16px">No expenses this month yet</div></div>`;
  } else {
    html += `<div class="tx-hint">Swipe left to edit or delete</div><div class="card" style="padding:0 16px">`;
    sortedExp.forEach(tx => { html += txRowHtml(tx, true); });
    html += `</div>`;
  }
  // Income section
  html += `<div class="section-divider" style="display:flex;justify-content:space-between;align-items:center">
    <span>Income (${sortedInc.length})</span>
    <span style="font-weight:400;color:var(--green)">${fmt(sortedInc.reduce((s,i)=>s+(i.amount||0),0))}</span>
  </div>`;
  if (sortedInc.length === 0) {
    html += `<div class="card"><div class="empty-state" style="padding:16px">No income logged this month yet</div></div>`;
  } else {
    html += `<div class="tx-hint">Swipe left to edit or delete</div><div class="card" style="padding:0 16px">`;
    sortedInc.forEach(tx => { html += txRowHtml(tx, false); });
    html += `</div>`;
  }
  document.getElementById('page-transactions').innerHTML = html;
  initSwipe();
}

// ── RENDER GIFTS ───────────────────────────────────────
function renderGifts() {
  const g = SETTINGS.gifts || {christmas:[],birthdays:[]};
  const xmas = g.christmas || [];
  const bdays = g.birthdays || [];
  const xmasTotal = xmas.reduce((t,p)=>t+(p.budget||0),0);
  const bdayTotal = bdays.reduce((t,p)=>t+(p.budget||0),0);
  const monthlyTotal = (xmasTotal+bdayTotal)/12;
  const now = new Date();
  const thisMonth = now.getMonth()+1;

  let html = `<div class="card" style="background:var(--green-light);border-color:var(--green);margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Monthly Savings Needed</div>
        <div style="font-size:24px;font-weight:700;color:var(--green)">${fmt(monthlyTotal)}/mo</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Xmas: ${fmt(xmasTotal/12)} · Bdays: ${fmt(bdayTotal/12)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Total Remaining</div>
        <div style="font-size:24px;font-weight:700;color:var(--green)">${fmt((xmasTotal - xmas.reduce((t,p)=>t+(p.spent||0),0)) + (bdayTotal - bdays.reduce((t,p)=>t+(p.spent||0),0)))}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Xmas: ${fmt(xmasTotal - xmas.reduce((t,p)=>t+(p.spent||0),0))} · Bdays: ${fmt(bdayTotal - bdays.reduce((t,p)=>t+(p.spent||0),0))}</div>
      </div>
    </div>
  </div>`;

  // Birthdays this month
  const thisMonthBdays = bdays.filter(p=>{
    if(!p.date) return false;
    return parseInt(p.date.split('/')[0])===thisMonth;
  });
  if (thisMonthBdays.length) {
    html += `<div class="card" style="background:var(--amber-light);border-color:var(--amber);margin-bottom:12px">

// ── SUBMIT HANDLERS ────────────────────────────────────
async function submitExpense() {
  const store = document.getElementById('expStore').value.trim();
  const amount = parseFloat(document.getElementById('expAmount').value);
  const category = document.getElementById('expCat').value;
  const notes = document.getElementById('expNotes').value.trim();
  if (!store||isNaN(amount)||amount<=0){showToast('Please fill in store and amount');return;}
  try {
    await push(ref(`months/${currentMonth}/expenses`),{store,amount,category,notes,type:'expense',date:new Date().toISOString()});
    document.getElementById('expStore').value='';
    document.getElementById('expAmount').value='';
    document.getElementById('expNotes').value='';
    // Check if this expense pushes the category over budget
    // Wait a tick for Firebase to update DATA, then check
    setTimeout(async () => {
      const d = getMonthData(currentMonth);
      if (!d) return;
      const allCats = [...(d.discretionary||[]),...(d.fixed||[])];
      const cat = allCats.find(c=>c.name===category);
      if (!cat) return;
      const spent = d.catTotals[category]||0;
      const budget = cat.budgeted||0;
      const overage = spent - budget;
      if (overage > 0 && d.unassignedBudget > 0) {
        // Move money from unassigned to cover overage (up to available unassigned)
        const toMove = Math.min(overage, d.unassignedBudget);
        const newBudget = budget + toMove;
        // Find the index of the category in its section
        const discIdx = (d.discretionary||[]).findIndex(c=>c.name===category);
        const fixedIdx = discIdx === -1 ? (d.fixed||[]).findIndex(c=>c.name===category) : -1;
        if (discIdx !== -1) {
          await set(ref(`months/${currentMonth}/discretionary/${discIdx}/budgeted`), newBudget);
        } else if (fixedIdx !== -1) {
          await set(ref(`months/${currentMonth}/fixed/${fixedIdx}/budgeted`), newBudget);
        }
        showToast(`✓ Added — moved ${fmt(toMove)} from unassigned to ${category}`);
      } else if (overage > 0) {
        showToast(`✓ Added — ${category} is ${fmt(overage)} over budget`);
      } else {
        showToast(`✓ Added ${fmt(amount)} at ${store}`);
      }
    }, 800);
  } catch(e){showToast('Error: '+e.message);}
}

async function submitIncome() {
  const source = document.getElementById('incSource').value;
  const amount = parseFloat(document.getElementById('incAmount').value);
  const notes = document.getElementById('incNotes').value.trim();
  if (!source||isNaN(amount)||amount<=0){showToast('Please fill in source and amount');return;}
  try {
    await push(ref(`months/${currentMonth}/income`),{source,amount,notes,date:new Date().toISOString()});
    // Auto-update income budget if actual exceeds expected
    const d = getMonthData(currentMonth);
    if (d) {
      const key = source.replace(/[^a-zA-Z0-9]/g,'_');
      const currentBudgeted = (d.incomeBudgets||{})[key]||0;
      // Calculate new actual total for this source after adding
      const newActual = (d.income||[]).reduce((s,i)=>i.source===source?s+(i.amount||0):s, 0) + amount;
      if (newActual > currentBudgeted) {
        await set(ref(`months/${currentMonth}/incomeBudgets/${key}`), newActual);
        showToast(`✓ Added ${fmt(amount)} from ${source} — budget updated to ${fmt(newActual)}`);
      } else {
        showToast(`✓ Added ${fmt(amount)} from ${source}`);
      }
    } else {
      showToast(`✓ Added ${fmt(amount)} from ${source}`);
    }
    document.getElementById('incAmount').value='';
    document.getElementById('incNotes').value='';
    document.getElementById('tithePreview').style.display='none';
  } catch(e){showToast('Error: '+e.message);}
}

function openIncomeBudgetEdit(src, key, current) {
  budgetEditMeta = {section:'incomeBudgets', src, key};
  document.getElementById('modalTitle').textContent = 'Expected: '+src;
  document.getElementById('modalDeleteBtn').style.display='none';
  document.getElementById('modalSaveBtn').onclick = saveBudgetEdit;
  document.getElementById('modalBody').innerHTML=`
    <div class="form-group"><label class="form-label">Expected Amount</label><input class="form-input" id="budgetAmt" type="number" step="0.01" value="${current}"/></div>`;
  document.getElementById('editModal').classList.add('open');

async function saveBudgetEdit() {
  const newAmt = parseFloat(document.getElementById('budgetAmt').value);
  if (isNaN(newAmt)||newAmt<0){showToast('Please enter a valid amount');return;}
  const {section,name,src,key} = budgetEditMeta;
  try {
    if (section==='incomeBudgets') {
      await set(ref(`months/${currentMonth}/incomeBudgets/${key}`),newAmt);
    } else {
      const d = getMonthData(currentMonth);
      const list = d[section];
      const idx = list.findIndex(c=>c.name===name);
      if (idx<0){showToast('Category not found');return;}
      const old = list[idx].budgeted||0;
      const max = d.unassignedBudget+old;
      if (newAmt>max){showToast(`Max you can set is ${fmt(max)}`);return;}
      await set(ref(`months/${currentMonth}/${section}/${idx}/budgeted`),newAmt);
    }
    showToast('✓ Budget updated');closeModal();
  } catch(e){showToast('Error: '+e.message);}
}

// ── SWIPE ──────────────────────────────────────────────
let swipeStartX=0,swipeEl=null;
function initSwipe() {
  document.querySelectorAll('.tx-item').forEach(el=>{
    el.addEventListener('touchstart',e=>{swipeStartX=e.touches[0].clientX;swipeEl=el;},{passive:true});
    el.addEventListener('touchmove',e=>{
      if(!swipeEl)return;
      const dx=e.touches[0].clientX-swipeStartX;
      if(dx<-5)el.style.transform=`translateX(${Math.max(dx,-128)}px)`;
      else if(dx>5){el.style.transform='translateX(0)';el.style.transition='transform .25s ease';}
    },{passive:true});
    el.addEventListener('touchend',e=>{
      if(!swipeEl)return;
      const dx=e.changedTouches[0].clientX-swipeStartX;
      el.style.transition='transform .25s ease';
      el.style.transform=dx<-60?'translateX(-128px)':'translateX(0)';
      swipeEl=null;
    },{passive:true});
  });
}
function handleTxTap(el) {
  const cur=parseFloat(el.style.transform?.replace('translateX(',''))||0;
  el.style.transition='transform .25s ease';
  el.style.transform=cur<-20?'translateX(0)':'translateX(-128px)';
}
function closeAllSwipes() {
  document.querySelectorAll('.tx-item').forEach(el=>{el.style.transition='transform .25s ease';el.style.transform='translateX(0)';});
}

let toastQueue = [];
let toastRunning = false;

function showToast(msg) {
  toastQueue.push(msg);
  if (!toastRunning) processToastQueue();
}

function processToastQueue() {
  if (toastQueue.length === 0) { toastRunning = false; return; }
  toastRunning = true;
  const msg = toastQueue.shift();
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => processToastQueue(), 300); // gap between toasts
  }, 2500);
}
function showPage(page,btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if(btn)btn.classList.add('active');
  currentPage=page;renderCurrentPage();
}
function renderCurrentPage() {
  if(currentPage==='dashboard')renderDashboard();
  else if(currentPage==='spending')renderSpending();
  else if(currentPage==='transactions')renderTransactions();
  else if(currentPage==='add')renderAdd();
  else if(currentPage==='gifts')renderGifts();
  else if(currentPage==='subscriptions')renderSubscriptions();
  else if(currentPage==='subscriptions')renderSubscriptions();
  else if(currentPage==='subscriptions')renderSubscriptions();
  else if(currentPage==='settings')renderSettings();
}
function selectMonth(month) {
  currentMonth=month;
  document.querySelectorAll('.month-tab').forEach(t=>t.classList.remove('active'));

// ── INIT ───────────────────────────────────────────────
async function init() {
  try {
    await initAllMonths();

    // Listen to settings
    onValue(ref('settings/incomeSources'),snap=>{
      if(snap.val()){INCOME_SOURCES=snap.val();if(currentPage==='settings'||currentPage==='add'||currentPage==='spending')renderCurrentPage();}
    });
    onValue(ref('settings/titheExempt'),snap=>{
      if(snap.val()){TITHE_EXEMPT.length=0;snap.val().forEach(s=>TITHE_EXEMPT.push(s));renderCurrentPage();}
    });
    onValue(ref('settings/subscriptions'),snap=>{
      SETTINGS.subscriptions=snap.val()||[];
      if(currentPage==='subscriptions')renderSubscriptions();
      else renderCurrentPage();
    });
    onValue(ref('settings/gifts'),snap=>{
      SETTINGS.gifts=snap.val()||{christmas:[],birthdays:[]};
      if(currentPage==='gifts')renderGifts();
    });

    // Build month tabs
    const tabs=document.getElementById('monthTabs');
    const calMonth=ALL_MONTHS[new Date().getMonth()];
    ALL_MONTHS.forEach(m=>{
      const btn=document.createElement('button');
      const isFuture=ALL_MONTHS.indexOf(m)>ALL_MONTHS.indexOf(calMonth);
      btn.className='month-tab'+(m===currentMonth?' active':'')+(isFuture?' future':'');
      btn.textContent=m.slice(0,3);btn.setAttribute('data-month',m);
      btn.onclick=()=>selectMonth(m);tabs.appendChild(btn);
    });
    document.getElementById('navMonth').textContent=currentMonth;
    applyMonthTheme(currentMonth);

    // Start listening
    for(let i=0;i<=ALL_MONTHS.indexOf(currentMonth);i++)listenToMonth(ALL_MONTHS[i]);

    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('appShell').style.display='block';
    renderDashboard();
  } catch(e) {
    document.getElementById('loadingScreen').innerHTML=`<div style="text-align:center;padding:40px 24px">
      <div style="font-size:36px;margin-bottom:16px">⚠️</div>
      <div style="font-family:'Playfair Display',serif;font-size:22px;margin-bottom:12px;color:var(--text)">Connection Error</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6">${e.message}</div>
      <button onclick="location.reload()" style="padding:12px 28px;background:var(--green);color:white;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer">Try Again</button>
    </div>`;
  }
}

// ── PIE CHART ──────────────────────────────────────────
let pieMode = 'spending';
const PIE_COLORS = ['#2d6a4f','#52b788','#74c69d','#1a4a7a','#2d6eaa','#4895d4','#b8860b','#d4a017','#e9c46a','#c0392b','#e74c3c','#9b59b6','#8e44ad','#16a085','#1abc9c'];

function setPieMode(mode) {
  pieMode = mode;
  document.getElementById('pieIncBtn')?.classList.toggle('active', mode==='income');
  document.getElementById('pieSpendBtn')?.classList.toggle('active', mode==='spending');
  drawPie();
}

function drawPie() {
  const svg = document.getElementById('pieSvg');
  const legend = document.getElementById('pieLegend');
  if (!svg || !legend) return;
  const d = getMonthData(currentMonth);
  if (!d) return;

  let slices = [];
  if (pieMode === 'income') {
    // Group by source
    const totals = {};
    d.income.forEach(i => { totals[i.source] = (totals[i.source]||0) + (i.amount||0); });
    slices = Object.entries(totals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    document.getElementById('pieCenterVal').textContent = fmt(d.totalIncome);
    document.getElementById('pieCenterSub').textContent = 'Total Income';
  } else {
    // Only discretionary categories, excluding Tithe and Subscriptions
    const discNames = new Set(DEFAULT_DISCRETIONARY.map(c=>c.name));
    const excluded = new Set(['Tithe']);
    const totals = {};
    Object.entries(d.catTotals).forEach(([k,v])=>{ if(discNames.has(k) && !excluded.has(k) && v>0) totals[k]=v; });
    slices = Object.entries(totals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    const discTotal = slices.reduce((s,[,v])=>s+v,0);
    document.getElementById('pieCenterVal').textContent = fmt(discTotal);
    document.getElementById('pieCenterSub').textContent = 'Discretionary';
  }

  const total = slices.reduce((s,[,v])=>s+v, 0);
  if (total === 0) { svg.innerHTML = ''; legend.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px">No data yet</div>'; return; }

  // Draw pie
  let angle = 0;
  let svgHtml = '';
  slices.forEach(([name, val], i) => {
    const pct = val / total;
    const a1 = angle * Math.PI * 2;
    const a2 = (angle + pct) * Math.PI * 2;
    const x1 = Math.cos(a1), y1 = Math.sin(a1);
    const x2 = Math.cos(a2), y2 = Math.sin(a2);
    const large = pct > 0.5 ? 1 : 0;
    const color = PIE_COLORS[i % PIE_COLORS.length];
    if (pct > 0.001) {
      svgHtml += `<path d="M0,0 L${x1},${y1} A1,1,0,${large},1,${x2},${y2}Z" fill="${color}" stroke="white" stroke-width="0.02"/>`;
    }
    angle += pct;
  });
  svg.innerHTML = svgHtml;

  // Legend
  legend.innerHTML = slices.slice(0,8).map(([name,val],i)=>{
    const pct = Math.round(val/total*100);
    const color = PIE_COLORS[i % PIE_COLORS.length];
    return `<div class="pie-legend-item">
      <div class="pie-legend-left">
        <div class="pie-legend-dot" style="background:${color}"></div>
        <span class="pie-legend-name">${CAT_ICONS[name]||''} ${name}</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="pie-legend-pct">${pct}%</span>
        <span class="pie-legend-amt">${fmt(val)}</span>
      </div>
    </div>`;
  }).join('');
}

// ── AUTO REBALANCE ────────────────────────────────────────
async function autoRebalanceOverspent(month) {
  const d = getMonthData(month);
  if (!d) return;

  const allCats = [...d.discretionary, ...d.fixed, ...d.savings];
  const updates = {};
  const notifications = [];

  for (const cat of allCats) {
    if (cat.autoCalc) continue; // skip auto-calculated lines
    const actual = d.catTotals[cat.name] || d.savingsTotals[cat.name] || 0;
    const budget = cat.budgeted || 0;
    const overspent = actual - budget;
    if (overspent <= 0) continue;

    // Recalculate unassigned fresh each iteration
    const freshD = getMonthData(month);
    if (!freshD) break;
    const unassigned = freshD.unassignedBudget;
    if (unassigned <= 0) continue; // no free money to move

    const moveAmt = Math.min(overspent, unassigned);
    const newBudget = budget + moveAmt;

    // Find index in Firebase array
    const section = d.discretionary.includes(cat) ? 'discretionary' :
                    d.fixed.includes(cat) ? 'fixed' : 'savings';
    const sectionData = DATA[month][section] || [];
    const idx = sectionData.findIndex(c=>c.name===cat.name);
    if (idx >= 0) {
      updates[`months/${month}/${section}/${idx}/budgeted`] = newBudget;
      // Optimistically update local data so next iteration sees updated unassigned
      sectionData[idx].budgeted = newBudget;
      notifications.push(`Moved ${fmt(moveAmt)} from unassigned → ${cat.name}`);
    }
  }

  if (Object.keys(updates).length > 0) {
    await update(dbRef(database), updates);
    // Show notification after a short delay so it appears after render
    setTimeout(() => {
      notifications.forEach(msg => showToast('Auto-budget: ' + msg));
    }, 100); // small delay — toast queue handles ordering
  }
}
