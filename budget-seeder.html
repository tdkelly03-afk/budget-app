function log(msg, cls='') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.runSeed = async function() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Importing...';

  try {
    for (const [month, d] of Object.entries(SEED_DATA)) {
      log(`\n📅 Importing ${month}...`);

      // Set budgets
      const updates = {};
      updates[`months/${month}/initialized`] = true;
      updates[`months/${month}/incomeBudgets`] = d.incomeBudgets;
      d.discretionary.forEach((c,i) => { updates[`months/${month}/discretionary/${i}`] = c; });
      d.fixed.forEach((c,i) => { updates[`months/${month}/fixed/${i}`] = c; });
      d.savings.forEach((c,i) => { updates[`months/${month}/savings/${i}`] = c; });
      
      await update(ref(db), updates);
      log(`  ✓ Budget lines set`);

      // Add expenses
      const expRef = ref(db, `months/${month}/expenses`);
      // Clear existing first
      await set(expRef, null);
      for (const e of d.expenses) {
        const newRef = ref(db, `months/${month}/expenses/${Date.now()}_${Math.random().toString(36).slice(2,6)}`);
        await set(newRef, e);
      }
      log(`  ✓ ${d.expenses.length} expenses imported`);

      // Add income
      const incRef = ref(db, `months/${month}/income`);
      await set(incRef, null);
      for (const inc of d.income) {
        const newRef = ref(db, `months/${month}/income/${Date.now()}_${Math.random().toString(36).slice(2,6)}`);
        await set(newRef, inc);
      }
      log(`  ✓ ${d.income.length} income entries imported`);

      log(`  ✅ ${month} complete!`, 'done');
    }

    log('\n🎉 All done! You can close this page.', 'done');
    document.getElementById('status').innerHTML = '<span style="color:#2d6a4f;font-weight:600">✅ Import complete! February and March data is now in your app.</span>';
    btn.textContent = 'Import Complete!';

  } catch(e) {
    log(`\n❌ Error: ${e.message}`, 'error');
    btn.disabled = false;
    btn.textContent = 'Try Again';
  }
};
